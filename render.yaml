services:
  - type: web
    name: mesh-protocol-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: .
    buildCommand: npm ci --ignore-scripts --include=dev && npm run build
    startCommand: node backend/dist/backend/src/db/migrate.js && node backend/dist/backend/src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3100
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: AI_PROVIDER
        value: mock
      - key: REDIS_URL
        value: ""
      - key: GENLAYER_RPC_URL
        value: https://rpc-bradbury.genlayer.com
      - key: DATABASE_URL
        fromDatabase:
          name: mesh-protocol-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: GENLAYER_PRIVATE_KEY
        sync: false

databases:
  - name: mesh-protocol-db
    plan: free
    region: oregon
